name: Bug report
description: Report an AndroidTV Ultimate problem with the details needed to reproduce it.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve AndroidTV Ultimate. Generate the privacy-safe diagnostics from **Plugin Settings → Tools & Support** and remove anything you do not want to share.

  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the behavior and when it occurs.
      placeholder: The TV appears offline after…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open…
        2. Select…
        3. Observe…
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: 0.1.1
    validations:
      required: true

  - type: input
    id: homebridge-version
    attributes:
      label: Homebridge and Node.js versions
      placeholder: Homebridge 2.x, Node.js 22.x
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: TV manufacturer, model, and Android/Google TV version
      placeholder: Manufacturer / model / OS version

  - type: dropdown
    id: connection
    attributes:
      label: Connection method
      options:
        - Ethernet
        - Wi-Fi
        - Unknown

  - type: textarea
    id: diagnostics
    attributes:
      label: Privacy-safe diagnostics
      description: Paste diagnostics generated by the plugin. Pairing certificates and private keys must never be included.
      render: json

  - type: textarea
    id: logs
    attributes:
      label: Relevant Homebridge logs
      description: Remove public IPs, tokens, credentials, and any personal information.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for the same problem.
          required: true
        - label: I removed credentials, private keys, and personal information.
          required: true
        - label: I tested with the latest published plugin version.
          required: true
