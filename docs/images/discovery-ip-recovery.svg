<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" aria-labelledby="title description" role="img" viewBox="0 0 1200 760"><title id="title">AndroidTV Ultimate discovery and IP recovery flow</title><desc id="description">Android TV Remote Service advertisements are scanned, matched to a stable identity, and compared with the cached endpoint. Unchanged endpoints keep their connection. Changed endpoints update the cache, close the stale connection, reconnect using the existing TLS certificate, and update HomeKit.</desc><defs><linearGradient id="background" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#111827"/><stop offset="1" stop-color="#172554"/></linearGradient><linearGradient id="accent" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#2563eb"/></linearGradient><filter id="shadow" width="140%" height="140%" x="-20%" y="-20%"><feDropShadow dx="0" dy="6" flood-color="#020617" flood-opacity=".35" stdDeviation="8"/></filter><marker id="arrow" markerHeight="8" markerWidth="8" orient="auto-start-reverse" refX="8" refY="5" viewBox="0 0 10 10"><path fill="#a78bfa" d="M 0 0 L 10 5 L 0 10 z"/></marker><style>.heading{font:700 28px -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;fill:#f8fafc}.subheading{font:400 16px -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;fill:#a5b4fc}.label,.small{font:600 17px -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;fill:#f8fafc;text-anchor:middle}.small{font:500 14px -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;fill:#cbd5e1}.branch{font:700 14px -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;fill:#c4b5fd}.accent-box,.box,.decision{stroke-width:2;filter:url(#shadow)}.box{fill:#1e293b;stroke:#475569;rx:14}.accent-box,.decision{stroke:#a78bfa}.accent-box{fill:url(#accent);rx:14}.decision{fill:#312e81}.line{fill:none;stroke:#a78bfa;stroke-width:3;marker-end:url(#arrow)}</style></defs><rect width="1200" height="760" fill="url(#background)" rx="24"/><text x="50" y="55" class="heading">Discovery and automatic IP recovery</text><text x="50" y="84" class="subheading">Stable device identity keeps pairing intact when the network endpoint changes.</text><rect width="250" height="86" x="50" y="125" class="accent-box"/><text x="175" y="158" class="label">Android TV advertises</text><text x="175" y="185" class="small">Remote Service v2</text><rect width="190" height="86" x="355" y="125" class="box"/><text x="450" y="175" class="label">mDNS scan</text><rect width="220" height="86" x="600" y="125" class="box"/><text x="710" y="158" class="label">Match stable</text><text x="710" y="185" class="label">device identity</text><rect width="270" height="86" x="875" y="125" class="box"/><text x="1010" y="158" class="label">Read cached</text><text x="1010" y="185" class="label">network endpoint</text><path d="M300 168 H345" class="line"/><path d="M545 168 H590" class="line"/><path d="M820 168 H865" class="line"/><path d="M1010 211 V250" class="line"/><path d="M1010 250 L1120 330 L1010 410 L900 330 Z" class="decision"/><text x="1010" y="322" class="label">IP address or</text><text x="1010" y="349" class="label">port changed?</text><rect width="190" height="86" x="650" y="287" class="box"/><text x="745" y="322" class="label">Keep current</text><text x="745" y="349" class="label">connection</text><path d="M900 330 H850" class="line"/><text x="865" y="316" class="branch">No</text><path d="M1010 410 V455" class="line"/><text x="1025" y="440" class="branch">Yes</text><rect width="270" height="70" x="875" y="465" class="box"/><text x="1010" y="507" class="label">Update discovery cache</text><path d="M875 500 H820" class="line"/><rect width="260" height="70" x="550" y="465" class="box"/><text x="680" y="507" class="label">Close stale connection</text><path d="M550 500 H495" class="line"/><rect width="295" height="90" x="190" y="455" class="box"/><text x="337" y="490" class="label">Reconnect with existing</text><text x="337" y="519" class="label">TLS certificate</text><path d="M337 545 V590" class="line"/><rect width="295" height="86" x="190" y="600" class="accent-box"/><text x="337" y="636" class="label">Update live state</text><text x="337" y="663" class="small">Apple Home and Homebridge</text><rect width="595" height="86" x="550" y="600" fill="#172033" stroke="#334155" stroke-width="2" rx="14"/><text x="847" y="636" class="small">Pairing credentials remain unchanged</text><text x="847" y="663" class="small">Only the cached IP address and port are refreshed</text></svg>