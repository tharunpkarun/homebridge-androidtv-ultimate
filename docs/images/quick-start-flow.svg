<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="360" viewBox="0 0 1400 360" role="img" aria-labelledby="title description">
  <title id="title">AndroidTV Ultimate quick start flow</title>
  <desc id="description">Install the plugin, add the platform, scan the network, select a television, enter its pairing code, save and restart Homebridge, then control the television from Apple Home.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
    </marker>
    <style>
      .heading { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fafc; }
      .subheading { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #a5b4fc; }
      .number { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ddd6fe; text-anchor: middle; }
      .label { font: 600 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fafc; text-anchor: middle; }
      .box { fill: #1e293b; stroke: #475569; stroke-width: 2; rx: 14; filter: url(#shadow); }
      .accent-box { fill: url(#accent); stroke: #a78bfa; stroke-width: 2; rx: 14; filter: url(#shadow); }
      .step { fill: #4c1d95; stroke: #8b5cf6; stroke-width: 2; }
      .line { fill: none; stroke: #a78bfa; stroke-width: 3; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1400" height="360" rx="24" fill="url(#background)"/>
  <text x="50" y="58" class="heading">From installation to Apple Home</text>
  <text x="50" y="87" class="subheading">Pair locally in a few guided steps—no cloud account or external bridge required.</text>

  <rect x="45" y="145" width="165" height="105" class="accent-box"/>
  <circle cx="72" cy="169" r="16" class="step"/><text x="72" y="174" class="number">1</text>
  <text x="127" y="190" class="label">Install</text><text x="127" y="217" class="label">plugin</text>

  <rect x="235" y="145" width="165" height="105" class="box"/>
  <circle cx="262" cy="169" r="16" class="step"/><text x="262" y="174" class="number">2</text>
  <text x="317" y="190" class="label">Add</text><text x="317" y="217" class="label">platform</text>

  <rect x="425" y="145" width="165" height="105" class="box"/>
  <circle cx="452" cy="169" r="16" class="step"/><text x="452" y="174" class="number">3</text>
  <text x="507" y="190" class="label">Scan</text><text x="507" y="217" class="label">network</text>

  <rect x="615" y="145" width="165" height="105" class="box"/>
  <circle cx="642" cy="169" r="16" class="step"/><text x="642" y="174" class="number">4</text>
  <text x="697" y="190" class="label">Select</text><text x="697" y="217" class="label">television</text>

  <rect x="805" y="145" width="165" height="105" class="box"/>
  <circle cx="832" cy="169" r="16" class="step"/><text x="832" y="174" class="number">5</text>
  <text x="887" y="190" class="label">Enter pairing</text><text x="887" y="217" class="label">code</text>

  <rect x="995" y="145" width="165" height="105" class="box"/>
  <circle cx="1022" cy="169" r="16" class="step"/><text x="1022" y="174" class="number">6</text>
  <text x="1077" y="190" class="label">Save and</text><text x="1077" y="217" class="label">restart</text>

  <rect x="1185" y="145" width="170" height="105" class="accent-box"/>
  <circle cx="1212" cy="169" r="16" class="step"/><text x="1212" y="174" class="number">7</text>
  <text x="1270" y="190" class="label">Control from</text><text x="1270" y="217" class="label">Apple Home</text>

  <path d="M210 198 H225" class="line"/><path d="M400 198 H415" class="line"/>
  <path d="M590 198 H605" class="line"/><path d="M780 198 H795" class="line"/>
  <path d="M970 198 H985" class="line"/><path d="M1160 198 H1175" class="line"/>

  <text x="700" y="310" class="subheading" text-anchor="middle">Remote Service v2 pairing stays inside your local network.</text>
</svg>
